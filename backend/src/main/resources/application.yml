server:
  port: ${SERVER_PORT:8081}
  tomcat:
    connection-timeout: 600000

spring:
  application:
    name: ad-manager-server
  profiles:
    default: dev

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.admanager.admin.model,com.admanager.tiktok.model
  configuration:
    map-underscore-to-camel-case: true

admanager:
  admin:
    auth:
      access-token-ttl-seconds: 14400
      refresh-token-ttl-seconds: 604800
      login-fail-threshold: 5
      lock-minutes: 30
  tiktok:
    api-base-url: https://business-api.tiktok.com
    auth-base-url: https://business-api.tiktok.com/portal/auth

logging:
  level:
    com.admanager: DEBUG
    org.springframework.web: INFO
